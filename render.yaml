services:
  # 1. FastAPI Backend API
  - type: web
    name: academicforge-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements-local.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LOCAL_LLM_PROVIDER
        value: fireworks
      - key: FIREWORKS_API_KEY
        sync: false # Render will securely prompt you for this key during deployment
      - key: LOCAL_LLM_MAX_TOKENS
        value: "700"
      - key: LOCAL_LLM_TEMPERATURE
        value: "0.2"

  # 2. Streamlit Web Client
  - type: web
    name: academicforge-frontend
    env: python
    plan: free
    buildCommand: pip install -r requirements-local.txt
    startCommand: streamlit run frontend/streamlit_app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: ACADEMICFORGE_BACKEND_URL
        value: https://academicforge-backend.onrender.com # Replace with your actual deployed backend service URL
